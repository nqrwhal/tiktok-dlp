services:
  tiktok-discord-downloader:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN:?Set DISCORD_TOKEN in .env}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:?Set DISCORD_CLIENT_ID in .env}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      DISCORD_CHANNEL_ID: ${DISCORD_CHANNEL_ID:-}
      DISCORD_OWNER_ID: ${DISCORD_OWNER_ID:-}
      WATCH_MANAGER_ROLE_ID: ${WATCH_MANAGER_ROLE_ID:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?Set PUBLIC_BASE_URL in .env}
      HTTP_PORT: ${HTTP_PORT:-8080}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-60}
      PROFILE_SCAN_LIMIT: ${PROFILE_SCAN_LIMIT:-5}
      PROFILE_BURST_SCAN_LIMIT: ${PROFILE_BURST_SCAN_LIMIT:-20}
      MONITOR_CONCURRENCY: ${MONITOR_CONCURRENCY:-2}
      DISCORD_UPLOAD_LIMIT_MB: ${DISCORD_UPLOAD_LIMIT_MB:-10}
      DOWNLOAD_LINK_TTL_MINUTES: ${DOWNLOAD_LINK_TTL_MINUTES:-30}
      RETENTION_DAYS: ${RETENTION_DAYS:-30}
      MAX_CONCURRENT_DOWNLOADS: ${MAX_CONCURRENT_DOWNLOADS:-1}
      MAX_DOWNLOAD_QUEUE_SIZE: ${MAX_DOWNLOAD_QUEUE_SIZE:-50}
      MAX_QUEUED_DOWNLOADS_PER_USER: ${MAX_QUEUED_DOWNLOADS_PER_USER:-3}
      MAX_QUEUED_DOWNLOADS_PER_GUILD: ${MAX_QUEUED_DOWNLOADS_PER_GUILD:-12}
      IMPORT_MAX_DURATION_SECONDS: ${IMPORT_MAX_DURATION_SECONDS:-120}
      IMPORT_CONCURRENCY: ${IMPORT_CONCURRENCY:-1}
      IMPORT_PROFILE_TIMEOUT_SECONDS: ${IMPORT_PROFILE_TIMEOUT_SECONDS:-600}
      IMPORT_API_TOKEN: ${IMPORT_API_TOKEN:-}
      CLEANUP_BATCH_SIZE: ${CLEANUP_BATCH_SIZE:-100}
      DELETION_CHECK_CONCURRENCY: ${DELETION_CHECK_CONCURRENCY:-2}
      DELETION_CHECK_BATCH_SIZE: ${DELETION_CHECK_BATCH_SIZE:-25}
      FETCH_TIMEOUT_SECONDS: ${FETCH_TIMEOUT_SECONDS:-30}
      MAX_SLIDESHOW_IMAGES: ${MAX_SLIDESHOW_IMAGES:-35}
      MAX_SLIDESHOW_ITEM_MB: ${MAX_SLIDESHOW_ITEM_MB:-20}
      MAX_SLIDESHOW_TOTAL_MB: ${MAX_SLIDESHOW_TOTAL_MB:-250}
      MAX_MEDIA_DOWNLOAD_MB: ${MAX_MEDIA_DOWNLOAD_MB:-2048}
      PING_MODE: ${PING_MODE:-none}
      PING_ROLE_ID: ${PING_ROLE_ID:-}
      DATA_DIR: ${DATA_DIR:-./data}
      STATE_DB: ${STATE_DB:-./data/state.db}
      DOWNLOAD_DIR: ${DOWNLOAD_DIR:-./data/downloads}
      YTDLP_PATH: ${YTDLP_PATH:-yt-dlp}
      YTDLP_COOKIES_FILE: ${YTDLP_COOKIES_FILE:-}
      YTDLP_RETRIES: ${YTDLP_RETRIES:-3}
      YTDLP_TIMEOUT_SECONDS: ${YTDLP_TIMEOUT_SECONDS:-60}
      REGISTER_COMMANDS_ON_START: ${REGISTER_COMMANDS_ON_START:-false}
    expose:
      - "${HTTP_PORT:-8080}"
    volumes:
      - ./data:/app/data
      # Optional cookies mount. Set YTDLP_COOKIES_FILE=/app/cookies/tiktok.txt if used.
      - ./cookies:/app/cookies:ro
    restart: unless-stopped

  rewind-web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_ARCHIVE_API_BASE: ${REWIND_PUBLIC_URL:-https://rewind.yufei.dev}
    environment:
      LIVE_LOCAL_MODE: "true"
      LIVE_DB_PATH: /app/data/state.db
      LIVE_DOWNLOADS_PATH: /app/data/downloads
      LIVE_BACKEND_URL: http://tiktok-discord-downloader:${HTTP_PORT:-8080}
      LIVE_IMPORT_API_TOKEN: ${IMPORT_API_TOKEN:-}
      LIVE_PUBLIC_BASE_URL: ${REWIND_PUBLIC_URL:-https://rewind.yufei.dev}
    expose:
      - "3000"
    volumes:
      - ./data:/app/data:ro
    depends_on:
      - tiktok-discord-downloader
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles:
      - cloudflare
    command: tunnel --no-autoupdate run --token-file /run/secrets/cloudflare_tunnel_token
    secrets:
      - cloudflare_tunnel_token
    depends_on:
      - tiktok-discord-downloader
      - rewind-web
    restart: unless-stopped

secrets:
  cloudflare_tunnel_token:
    file: ./.secrets/cloudflare_tunnel_token
