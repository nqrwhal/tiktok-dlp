services:
  tiktok-discord-downloader:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    expose:
      - "${HTTP_PORT:-8080}"
    volumes:
      - ./data:/app/data
      # Optional cookies mount. Set YTDLP_COOKIES_FILE=/app/cookies/tiktok.txt if used.
      - ./cookies:/app/cookies:ro
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles:
      - cloudflare
    command: tunnel --no-autoupdate run --token-file /run/secrets/cloudflare_tunnel_token
    secrets:
      - cloudflare_tunnel_token
    depends_on:
      - tiktok-discord-downloader
    restart: unless-stopped

secrets:
  cloudflare_tunnel_token:
    file: ./.secrets/cloudflare_tunnel_token
